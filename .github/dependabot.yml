version: 2

updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: chore(deps)
    groups:
      github-actions:
        patterns:
          - "*"

  - package-ecosystem: bun
    directory: /
    schedule:
      interval: weekly
      day: monday
    commit-message:
      prefix: chore(deps)
    groups:
      production-dependencies:
        dependency-type: production
      development-dependencies:
        dependency-type: development
