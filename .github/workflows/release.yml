name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Update npm
        run: npm install --global npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Create release pull request
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: bunx changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read package metadata
        id: package
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          package_name=$(node --print "require('./package.json').name")
          package_version=$(node --print "require('./package.json').version")

          echo "name=$package_name" >> "$GITHUB_OUTPUT"
          echo "version=$package_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$package_version" >> "$GITHUB_OUTPUT"

      - name: Publish package
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} is already published"
            exit 0
          fi

          npm stage publish --access public

      - name: Create GitHub release
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_VERSION: ${{ steps.package.outputs.version }}
        run: |
          if gh release view "${{ steps.package.outputs.tag }}" >/dev/null 2>&1; then
            echo "GitHub release ${{ steps.package.outputs.tag }} already exists"
            exit 0
          fi

          node <<'EOF' > release-notes.md
          const changelog = await import("node:fs/promises").then((fs) =>
            fs.readFile("CHANGELOG.md", "utf8")
          );
          const heading = `## ${process.env.PACKAGE_VERSION}`;
          const start = changelog.indexOf(heading);
          const bodyStart = start === -1 ? -1 : changelog.indexOf("\n", start) + 1;
          const nextHeading = bodyStart === -1 ? -1 : changelog.indexOf("\n## ", bodyStart);
          const notes = bodyStart === -1
            ? `Release ${process.env.PACKAGE_VERSION}`
            : changelog.slice(bodyStart, nextHeading === -1 ? undefined : nextHeading).trim();

          console.log(notes || `Release ${process.env.PACKAGE_VERSION}`);
          EOF

          gh release create "${{ steps.package.outputs.tag }}" \
            --target "$GITHUB_SHA" \
            --title "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" \
            --notes-file release-notes.md
