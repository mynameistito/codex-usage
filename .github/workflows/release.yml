name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14

      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          package-manager-cache: false

      - name: Update npm
        run: npm install --global npm@latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Create release pull request
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: bunx changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Read package metadata
        id: package
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          package_name=$(node --print "require('./package.json').name")
          package_version=$(node --print "require('./package.json').version")

          echo "name=$package_name" >> "$GITHUB_OUTPUT"
          echo "version=$package_version" >> "$GITHUB_OUTPUT"
          echo "tag=v$package_version" >> "$GITHUB_OUTPUT"

      - name: Publish package
        if: steps.changesets.outputs.hasChangesets == 'false'
        run: |
          if npm view "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "${{ steps.package.outputs.name }}@${{ steps.package.outputs.version }} is already published"
            exit 0
          fi

          npm stage publish --access public

      - name: Create GitHub release
        if: steps.changesets.outputs.hasChangesets == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_date=$(date --utc +%F)

          RELEASE_DATE="$release_date" node --input-type=module <<'EOF' > release-manifest.tsv
          const fs = await import("node:fs/promises");
          const changelog = await fs.readFile("CHANGELOG.md", "utf8");
          const packageJson = JSON.parse(await fs.readFile("package.json", "utf8"));
          const releasesDirectory = "release-notes";
          const headingPattern = /^##\s+([^\s]+).*$/gm;
          const headings = [...changelog.matchAll(headingPattern)];
          const releases = headings
            .map((heading, index) => {
              const version = heading[1];

              if (!/^\d+\.\d+\.\d+(?:[-+][0-9A-Za-z.-]+)?$/.test(version)) {
                return undefined;
              }

              const bodyStart = heading.index + heading[0].length;
              const nextHeading = headings[index + 1]?.index ?? changelog.length;
              const notes = changelog.slice(bodyStart, nextHeading).trim();

              return {
                notes: notes || `Release ${version}`,
                tag: `v${version}`,
                version,
              };
            })
            .filter(Boolean);

          if (releases.length === 0) {
            throw new Error("No release entries found in CHANGELOG.md");
          }

          await fs.rm(releasesDirectory, { force: true, recursive: true });
          await fs.mkdir(releasesDirectory);

          const manifest = releases.map((release, index) => {
            const notesPath = `${releasesDirectory}/${release.tag}.md`;
            const datedNotes = `Released on ${process.env.RELEASE_DATE}.\n\n${release.notes}`;

            return fs.writeFile(notesPath, datedNotes).then(() =>
              [
                release.tag,
                `${packageJson.name}@${release.version} (${process.env.RELEASE_DATE})`,
                notesPath,
                release.version === packageJson.version ? "true" : "false",
                index === 0 ? "true" : "false",
              ].join("\t")
            );
          });

          console.log((await Promise.all(manifest)).join("\n"));
          EOF

          while IFS=$'\t' read -r tag title notes_file is_current is_latest; do
            if gh release view "$tag" >/dev/null 2>&1; then
              echo "GitHub release $tag already exists"
              continue
            fi

            if git rev-parse --verify --quiet "refs/tags/$tag" >/dev/null; then
              gh release create "$tag" \
                --latest="$is_latest" \
                --notes-file "$notes_file" \
                --title "$title"
              continue
            fi

            if [ "$is_current" = "true" ]; then
              gh release create "$tag" \
                --latest="$is_latest" \
                --notes-file "$notes_file" \
                --target "$GITHUB_SHA" \
                --title "$title"
              continue
            fi

            echo "Skipping $tag because the git tag does not exist"
          done < release-manifest.tsv
